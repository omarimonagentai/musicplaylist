<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist</title>
  <link rel="icon" href="favicon.svg">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { color: #a8d8ea; border-bottom: 2px solid #a8d8ea; padding-bottom: 10px; }
    ol { padding-left: 30px; }
    li { padding: 6px 0; font-size: 1rem; }
    a { color: #f7cac9; text-decoration: none; transition: color 0.2s; }
    a:hover { color: #fff; text-decoration: underline; }
    .unavailable { color: #555; cursor: default; }
  </style>
</head>
<body>
  <h1 id="title"></h1>
  <ol id="list"></ol>
  <script>
    const params = new URLSearchParams(location.search);
    const playlistName = params.get('playlist') || '';

    fetch(`playlists/${playlistName}.json`)
      .then(r => r.json())
      .then(data => {
        document.title = data.title;
        document.getElementById('title').textContent = data.title;
        const ol = document.getElementById('list');
        data.songs.forEach((s, i) => {
          const li = document.createElement('li');
          if (s.audio) {
            li.innerHTML = `<a href="player.html?playlist=${playlistName}&idx=${i}">${s.title}</a>`;
          } else {
            li.innerHTML = `<span class="unavailable">${s.title}</span>`;
          }
          ol.appendChild(li);
        });
      });
  </script>
</body>
</html>
